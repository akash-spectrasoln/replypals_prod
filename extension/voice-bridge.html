<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ReplyPals Voice</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #FFF8F5; margin:0; padding:20px; display:flex; flex-direction:column; height: 100vh; box-sizing:border-box; justify-content:space-between; }
    .vb-header { text-align:center; font-weight:700; font-size:18px; color:#1A1D2E; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px;}
    .vb-mic { width: 80px; height: 80px; border-radius: 50%; background: #FF6B35; color: white; display: flex; align-items:center; justify-content:center; margin: 0 auto; cursor: pointer; box-shadow: 0 4px 15px rgba(255,107,53,0.3); transition: 0.2s; border:none;}
    .vb-mic:hover { transform: scale(1.05); }
    .vb-mic.recording { animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.4); } 50% { box-shadow: 0 0 0 15px rgba(255,107,53,0); } }
    .vb-lang { margin: 10px auto; display:block; padding: 6px 12px; border-radius: 6px; border: 1.5px solid #EAECF4; background: white; font-size:13px; outline:none; text-align:center; color:#1A1D2E;}
    .vb-text { flex:1; background: white; border-radius: 12px; border: 1.5px solid #FECAA6; padding: 15px; margin: 15px 0; overflow-y:auto; font-size: 14px; color: #1A1D2E; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); line-height:1.5;}
    .vb-actions { display:grid; grid-template-columns: 1fr; gap:8px; }
  </style>
</head>
<body>
  <div class="vb-header">
    <div style="width:24px;height:24px;border-radius:50%;background:#FF6B35;color:white;display:flex;align-items:center;justify-content:center;font-size:12px;">R</div>
    ReplyPals Voice
  </div>
  
  <select id="vb-lang" class="vb-lang"></select>

  <button id="vb-mic" class="vb-mic recording" title="Stop recording">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>

  <div id="vb-text" class="vb-text">🎤 Initializing...</div>

  <div id="vb-actions" class="vb-actions" style="display:none;">
    <button id="vb-act-rewrite" class="va-btn va-primary text-base py-3">✨ Rewrite it</button>
    <button id="vb-act-generate" class="va-btn text-base py-3">⚡ Generate reply</button>
    <button id="vb-act-use" class="va-btn text-base py-3">✍️ Use as-is</button>
  </div>

  <script src="voice-engine.js"></script>
  <script src="voice-bridge.js"></script>
</body>
</html>
