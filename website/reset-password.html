<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ReplyPals</title>
  <meta name="description" content="Set a new password for your ReplyPals account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #FFF8F5 0%, #F8F9FE 50%, #FFF 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1A1D2E;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #EAECF4;
      z-index: 50;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: #FF6B35;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #0F2544;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.08);
      padding: 40px 36px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #0F2544;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #6B7280;
      font-size: 15px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #EAECF4;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1A1D2E;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: #FF6B35;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #9CA3AF;
      font-size: 16px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF6B35, #FF8C42);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: #FEF2F2;
      color: #991B1B;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: #ECFDF5;
      color: #065F46;
      border: 1px solid #A7F3D0;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
      text-align: center;
    }

    .waiting {
      text-align: center;
      padding: 60px 20px;
      color: #6B7280;
      font-size: 15px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #EAECF4;
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-mark">R</div><span class="logo-text">ReplyPals</span>
      </a>
    </div>
  </nav>

  <div class="main">
    <div class="card">
      <div id="waitingState" class="waiting">
        <div class="spinner"></div>
        Verifying your reset link...
      </div>

      <div id="resetForm" style="display:none;">
        <h1>Set new password 🔒</h1>
        <p class="subtitle">Choose a strong password for your account</p>

        <div id="errorMsg" class="error-msg"></div>

        <form id="resetFormEl">
          <label for="password">New Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="New password" required minlength="6"
              autocomplete="new-password">
            <button type="button" class="toggle-pw" id="toggle1">👁</button>
          </div>

          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
            <button type="button" class="toggle-pw" id="toggle2">👁</button>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">Update Password</button>
        </form>
      </div>

      <div id="successState" style="display:none;">
        <div class="success-msg" style="display:block;">✅ Password updated! Redirecting to dashboard...</div>
      </div>

      <div id="errorState" style="display:none;">
        <div class="error-msg" style="display:block;">This reset link has expired or is invalid. <a
            href="forgot-password" style="color:#991B1B;font-weight:600;">Request a new one →</a></div>
      </div>
    </div>
  </div>

  <script>
    // <!-- REPLACE these with your Supabase project values -->
    const SUPABASE_URL = 'https://lcnusuiwxamjvosjgsrl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjbnVzdWl3eGFtanZvc2pnc3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTQ2OTUsImV4cCI6MjA4ODczMDY5NX0.edcKlXnNdzACCsQmTp4-xPOCp4TVCmwjPlXkORcjQ24';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let readyToReset = false;

    // Password toggles
    document.getElementById('toggle1').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('toggle2').addEventListener('click', () => {
      const pw = document.getElementById('confirmPassword');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    // Listen for PASSWORD_RECOVERY event from Supabase
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        readyToReset = true;
        document.getElementById('waitingState').style.display = 'none';
        document.getElementById('resetForm').style.display = 'block';
      } else if (event === 'SIGNED_IN' && !readyToReset) {
        // User came back already logged in — check for hash token
        const hash = window.location.hash;
        if (hash.includes('type=recovery')) {
          readyToReset = true;
          document.getElementById('waitingState').style.display = 'none';
          document.getElementById('resetForm').style.display = 'block';
        }
      }
    });

    // Timeout — show error if no event fires
    setTimeout(() => {
      if (!readyToReset) {
        document.getElementById('waitingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
      }
    }, 5000);

    // Submit new password
    document.getElementById('resetFormEl').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (pw !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      errorMsg.style.display = 'none';

      const { error } = await sb.auth.updateUser({ password: pw });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      } else {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
        setTimeout(() => { window.location.href = 'dashboard'; }, 2000);
      }
    });
  </script>
</body>

</html>
