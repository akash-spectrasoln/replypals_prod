<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ReplyPals</title>
  <meta name="description" content="Reset your ReplyPals account password.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #FFF8F5 0%, #F8F9FE 50%, #FFF 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1A1D2E;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #EAECF4;
      z-index: 50;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: #FF6B35;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #0F2544;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.08);
      padding: 40px 36px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #0F2544;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #6B7280;
      font-size: 15px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrap {
      margin-bottom: 20px;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #EAECF4;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1A1D2E;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: #FF6B35;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF6B35, #FF8C42);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: #FEF2F2;
      color: #991B1B;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: #ECFDF5;
      color: #065F46;
      border: 1px solid #A7F3D0;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
      text-align: center;
      line-height: 1.6;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #6B7280;
      text-decoration: none;
    }

    .back-link:hover {
      color: #FF6B35;
    }
  </style>
</head>

<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-mark">R</div><span class="logo-text">ReplyPals</span>
      </a>
    </div>
  </nav>

  <div class="main">
    <div class="card">
      <h1>Forgot password? 🔑</h1>
      <p class="subtitle">No worries, we'll send you a reset link</p>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <form id="forgotForm">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
      </form>

      <a href="login.html" class="back-link">← Back to sign in</a>
    </div>
  </div>

  <script>
    // <!-- REPLACE these with your Supabase project values -->
    const SUPABASE_URL = 'https://lcnusuiwxamjvosjgsrl.supabase.co';
    const apiBaseOverride = new URLSearchParams(window.location.search).get('api_base');
    const API_BASE = apiBaseOverride || window.location.origin;
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjbnVzdWl3eGFtanZvc2pnc3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTQ2OTUsImV4cCI6MjA4ODczMDY5NX0.edcKlXnNdzACCsQmTp4-xPOCp4TVCmwjPlXkORcjQ24';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('forgotForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      errorMsg.style.display = 'none';

      const email = document.getElementById('email').value.trim();

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html'
      });

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
      } else {
        form.style.display = 'none';
        successMsg.textContent = '✅ Check your email for a reset link!';
        successMsg.style.display = 'block';
      }
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
    });
  </script>
</body>

</html>
