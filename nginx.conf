server {
  listen __PORT__;
  server_name www.replypals.in;
  return 301 https://replypals.in$request_uri;
}

server {
  listen __PORT__;
  server_name replypals.in _;

  location = /healthz {
    default_type text/plain;
    return 200 "ok";
  }

  location = /admin {
    return 301 /admin/;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    add_header Access-Control-Allow-Origin "https://replypals.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location ^~ /admin/ {
    root /var/www;
    try_files $uri $uri/ /admin/index.html;
  }

  location / {
    root /var/www/website;
    index index.html;
    try_files $uri $uri/ $uri.html =404;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
    root /var/www/website;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types text/plain text/css application/json
             application/javascript text/xml application/xml
             application/xml+rss text/javascript;
  gzip_min_length 1000;
}
